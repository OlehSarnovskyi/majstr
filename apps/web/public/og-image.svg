<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F1F5F9"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="#0D9488"/>

  <!-- Center card -->
  <rect x="200" y="80" width="800" height="470" rx="24" fill="#FFFFFF"
        filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#0D948820"/>
    </filter>
  </defs>

  <!-- Teal header strip inside card -->
  <clipPath id="card-clip">
    <rect x="200" y="80" width="800" height="470" rx="24"/>
  </clipPath>
  <rect x="200" y="80" width="800" height="160" fill="#0D9488" clip-path="url(#card-clip)"/>

  <!-- Wrench icon (simplified) -->
  <g transform="translate(520, 115)" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
  </g>

  <!-- Brand name in header -->
  <text x="600" y="176" font-family="Arial,Helvetica,sans-serif" font-size="56"
        font-weight="700" fill="#FFFFFF" text-anchor="middle">Majstr</text>

  <!-- Main headline -->
  <text x="600" y="310" font-family="Arial,Helvetica,sans-serif" font-size="38"
        font-weight="700" fill="#1E293B" text-anchor="middle">Nájdite overených remeselníkov</text>
  <text x="600" y="362" font-family="Arial,Helvetica,sans-serif" font-size="38"
        font-weight="700" fill="#1E293B" text-anchor="middle">na Slovensku</text>

  <!-- Subtext -->
  <text x="600" y="420" font-family="Arial,Helvetica,sans-serif" font-size="24"
        fill="#64748B" text-anchor="middle">Inštalatér · Elektrikár · Maliar · Rekonštrukcia</text>

  <!-- URL pill -->
  <rect x="450" y="460" width="300" height="52" rx="26" fill="#F0FDFA"/>
  <text x="600" y="492" font-family="Arial,Helvetica,sans-serif" font-size="22"
        font-weight="600" fill="#0D9488" text-anchor="middle">majstr.app</text>

  <!-- Bottom accent -->
  <rect y="622" width="1200" height="8" fill="#0D9488"/>
</svg>
